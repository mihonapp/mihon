name: Yomori Release Readiness

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-readiness:
    name: Report release blockers
    runs-on: ubuntu-24.04

    steps:
      - name: Release pipeline status
        run: |
          echo "Yomori public releases are intentionally disabled."
          echo "Required before enabling releases:"
          echo "- establish Yomori release signing and key custody"
          echo "- finalize original visual branding"
          echo "- replace inherited update and support endpoints"
          echo "- validate representative compatible extensions"
          echo "- complete release notes and attribution review"
